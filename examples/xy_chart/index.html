<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Example</title>

  <!--suppress JSUnresolvedLibraryURL -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
      .container {
          padding: 20px;
      }
      canvas {
          border: 1px solid black;
          padding: 20px;
      }
  </style>
</head>
<body>

<div class="container">
  <canvas id="myChart"></canvas>
</div>

<script>
  const chartDom = document.querySelector('#myChart')

  const chart = new Chart(chartDom, {
  type: 'line',
  options: {
    plugins: {
      title: {
        display: true,
        text: 'Title',
        font: {
          size: 22
        }
      },
      subtitle: {
        display: true,
        text: 'Custom Chart Subtitle',
        font: {
          size: 18
        }
      }
    },
    scales: {
      x: {
        type: 'linear',
        position: 'bottom',
        title: {
          display: true,
          text: 'Значение параметра'
        }
      },
      y: {
        title: {
          display: true,
          text: 'Уровень сигнала, В'
        },
        min: 0,
        max: 5
      }
    }
  },
  data: {
    datasets: [
      {
        label: 'Test 1',
        data: [
          { x: 0, y: 0 },
          { x: 0, y: 0.22 },
          { x: 42, y: 0.48 },
          { x: 79, y: 0.79 },
          { x: 100, y: 0.99 },
          { x: 200, y: 1.79 },
          { x: 300, y: 2.58 },
        ]
      }
    ]
  }
})
</script>

</body>
</html>
